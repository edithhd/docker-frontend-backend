# 1. build be 
# 2. build fe 
# 3. push be docker hub 
# 4. push fe docker hub
# 5. docker compose 
# 6. docker ps buat cek

name: Build, Push, and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with self-hosted Docker runner
    runs-on: [self-hosted, docker-local]
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t edithhd/aegira-loan-service:latest
            ./aegira-loan-service/aegira-loan-service

      - name: Build Frontend Image
        run: |
          docker build \
            -t edithhd/creditappdemo-2:latest \
            ./creditappdemo-2

      - name: Push Backend Image
        run: 
          docker push edithhd/aegira-loan-service:latest

      - name: Push Frontend Image
        run: 
          docker push edithhd/creditappdemo-2:latest

      - name: Pull latest image
        run: 
          docker compose pull

      - name: Start application
        run: docker compose up -d --remove-orphans

      - name: Show running containers
        run: docker ps
